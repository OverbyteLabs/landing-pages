name: Deploy Landing Page

on:
  workflow_dispatch:
    inputs:
      idea:
        description: 'Folder name in ideas/ to deploy (e.g. my-app)'
        required: true
        type: string
      subdomain:
        description: 'Subdomain override - defaults to folder name'
        required: false
        type: string

env:
  API: https://api.hostinger.com
  ROOT_DOMAIN: overbytelabs.com

jobs:
  deploy:
    name: Deploy ${{ inputs.idea }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Resolve names
      - name: Resolve subdomain and paths
        id: vars
        run: |
          IDEA="${{ inputs.idea }}"
          SUB="${{ inputs.subdomain || inputs.idea }}"
          FQDN="${SUB}.${ROOT_DOMAIN}"

          if [ ! -d "ideas/$IDEA" ]; then
            echo "ERROR: ideas/$IDEA does not exist in this repo"
            exit 1
          fi

          echo "idea=$IDEA"     >> $GITHUB_OUTPUT
          echo "subdomain=$SUB" >> $GITHUB_OUTPUT
          echo "fqdn=$FQDN"     >> $GITHUB_OUTPUT

      # 2. Create subdomain website entry (best-effort — skips if API is down)
      - name: Create subdomain on Hostinger (if new)
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.HOSTINGER_TOKEN }}
          FQDN:  ${{ steps.vars.outputs.fqdn }}
        run: |
          HTTP=$(curl -s -o /tmp/existing.json -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            "$API/api/hosting/v1/websites?domain=$ROOT_DOMAIN")

          if [ "$HTTP" != "200" ]; then
            echo "WARNING: Hostinger API returned HTTP $HTTP - skipping subdomain creation"
            exit 0
          fi

          ORDER_ID=$(jq -r '.data[0].order_id // empty' /tmp/existing.json)
          COUNT=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "$API/api/hosting/v1/websites?domain=$FQDN" | jq '.data | length' 2>/dev/null || echo 0)

          if [ "$COUNT" = "0" ] && [ -n "$ORDER_ID" ]; then
            echo "Creating website entry for $FQDN..."
            curl -s -X POST "$API/api/hosting/v1/websites" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"domain\": \"$FQDN\", \"order_id\": $ORDER_ID}" | jq .
            echo "Waiting 20s for subdomain provisioning..."
            sleep 20
          else
            echo "Website $FQDN already exists or order_id unavailable - skipping"
          fi

      # 3. Upsert DNS CNAME record (best-effort — skips if API is down)
      - name: Set DNS CNAME for subdomain
        continue-on-error: true
        env:
          TOKEN: ${{ secrets.HOSTINGER_TOKEN }}
          SUB:   ${{ steps.vars.outputs.subdomain }}
        run: |
          HTTP=$(curl -s -o /tmp/dns.json -w "%{http_code}" -X PUT \
            "$API/api/dns/v1/zones/$ROOT_DOMAIN" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"overwrite\": false, \"zone\": [{\"name\": \"$SUB\", \"ttl\": 300, \"type\": \"CNAME\", \"records\": [{\"content\": \"$ROOT_DOMAIN.\"}]}]}")
          echo "DNS HTTP status: $HTTP"
          cat /tmp/dns.json

      # 4. Rsync files to hosting
      - name: Deploy files via rsync
        env:
          SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER:   ${{ secrets.HOSTINGER_SSH_HOST }}
          PORT:     ${{ secrets.HOSTINGER_SSH_PORT }}
          USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          FQDN:     ${{ steps.vars.outputs.fqdn }}
          IDEA:     ${{ steps.vars.outputs.idea }}
          SUB:      ${{ steps.vars.outputs.subdomain }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$SERVER" >> ~/.ssh/known_hosts 2>/dev/null

          echo "Server: $SERVER  Port: $PORT  User: $USERNAME"
          echo "FQDN: $FQDN  IDEA: $IDEA"

          # Test SSH connection first
          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            -v \
            "$USERNAME@$SERVER" \
            "echo SSH_OK && mkdir -p ~/domains/$ROOT_DOMAIN/public_html/$SUB" 2>&1 || true

          REMOTE="$USERNAME@$SERVER:~/domains/$ROOT_DOMAIN/public_html/$SUB/"
          echo "Syncing ideas/$IDEA/ to $REMOTE"

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10" \
            "./ideas/$IDEA/" \
            "$REMOTE"

      # 6. Summary
      - name: Deployment summary
        run: |
          echo "Deployed: ${{ steps.vars.outputs.idea }}"
          echo "URL:      https://${{ steps.vars.outputs.fqdn }}"
          echo "DNS propagation: up to 5 min (TTL 300s)"
