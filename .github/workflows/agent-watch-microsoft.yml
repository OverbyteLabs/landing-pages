name: Agent — Watch Microsoft Repositories

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task prompt for Copilot cloud agent'
        required: false
        default: >
          Check microsoft/vscode, microsoft/TypeScript, and microsoft/playwright
          for new releases, commits, and merged PRs in the last 7 days using the
          GitHub REST API. For each repo fetch:
            - /repos/microsoft/{repo}/releases?per_page=5
            - /repos/microsoft/{repo}/commits?per_page=10
            - /repos/microsoft/{repo}/pulls?state=closed&per_page=10
          Filter results to the past 7 days. Summarise findings per repository
          (new releases, notable commits, merged PRs) and write a MICROSOFT-WATCH-REPORT.md
          file in the repo root with the results, then open a pull request.
      base_branch:
        description: 'Branch for Copilot to branch from'
        required: false
        default: 'master'

jobs:
  trigger-copilot-agent:
    name: Create Copilot agent task
    runs-on: ubuntu-latest

    steps:
      - name: Create issue and assign to Copilot cloud agent
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          TITLE="Agent Task: Microsoft Repo Watch $(date -u +%Y-%m-%d)"
          PROMPT="${{ inputs.prompt }}"
          BASE="${{ inputs.base_branch }}"

          RESPONSE=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/OverbyteLabs/landing-pages/issues \
            --input - <<< "$(jq -n \
              --arg title "$TITLE" \
              --arg body "$PROMPT" \
              --arg base "$BASE" \
              '{
                title: $title,
                body: $body,
                assignees: ["copilot-swe-agent[bot]"],
                agent_assignment: {
                  target_repo: "OverbyteLabs/landing-pages",
                  base_branch: $base,
                  custom_instructions: "",
                  custom_agent: "",
                  model: ""
                }
              }')")

          ISSUE_URL=$(echo "$RESPONSE" | jq -r '.html_url')
          ISSUE_NUMBER=$(echo "$RESPONSE" | jq -r '.number')
          echo "Copilot agent task created: $ISSUE_URL"
          echo "Issue #$ISSUE_NUMBER — Copilot will open a PR when done."
