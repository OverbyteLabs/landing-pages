name: Deploy Main Site

on:
  push:
    branches: [master]
    paths:
      - 'business_page/**'
  workflow_dispatch:

env:
  ROOT_DOMAIN: overbytelabs.com

jobs:
  deploy:
    name: Deploy overbytelabs.com main site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy files via rsync
        env:
          SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER:   ${{ secrets.HOSTINGER_SSH_HOST }}
          PORT:     ${{ secrets.HOSTINGER_SSH_PORT }}
          USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$SERVER" >> ~/.ssh/known_hosts 2>/dev/null

          echo "Deploying business_page/ to ~/domains/$ROOT_DOMAIN/public_html/"

          ssh -i ~/.ssh/deploy_key -p "$PORT" \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            "$USERNAME@$SERVER" \
            "echo SSH_OK && mkdir -p ~/domains/$ROOT_DOMAIN/public_html" 2>&1 || true

          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o StrictHostKeyChecking=no -o ConnectTimeout=10" \
            "./business_page/" \
            "$USERNAME@$SERVER:~/domains/$ROOT_DOMAIN/public_html/"

      - name: Deployment summary
        run: |
          echo "Deployed: business_page/"
          echo "URL:      https://$ROOT_DOMAIN"

  # ── Smoke tests ──────────────────────────────────────────────────────────────
  smoke:
    name: Smoke tests
    needs: deploy
    runs-on: ubuntu-latest
    env:
      BASE: https://overbytelabs.com

    steps:
      - name: Wait for server to reflect changes
        run: sleep 15

      # ── Homepage ──────────────────────────────────────────────────────────
      - name: Homepage returns 200
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "$BASE/")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "ERROR: expected 200, got $STATUS"; exit 1; }

      - name: Homepage contains expected title
        run: |
          BODY=$(curl -s --max-time 15 "$BASE/")
          echo "$BODY" | grep -qi "overbyte" \
            || { echo "ERROR: 'Overbyte' not found in homepage body"; exit 1; }
          echo "Title/brand text found."

      - name: Homepage contains meta description
        run: |
          BODY=$(curl -s --max-time 15 "$BASE/")
          echo "$BODY" | grep -qi 'name="description"' \
            || { echo "ERROR: meta description missing"; exit 1; }
          echo "Meta description present."

      # ── Static assets ────────────────────────────────────────────────────
      - name: sitemap.xml is accessible and well-formed
        run: |
          STATUS=$(curl -o /tmp/sitemap.xml -s -w "%{http_code}" --max-time 15 "$BASE/sitemap.xml")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "ERROR: sitemap.xml returned $STATUS"; exit 1; }
          sudo apt-get install -y libxml2-utils -qq
          xmllint --noout /tmp/sitemap.xml && echo "sitemap.xml is well-formed."

      - name: robots.txt is accessible
        run: |
          STATUS=$(curl -o /tmp/robots.txt -s -w "%{http_code}" --max-time 15 "$BASE/robots.txt")
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "ERROR: robots.txt returned $STATUS"; exit 1; }
          grep -q "User-agent" /tmp/robots.txt || { echo "ERROR: robots.txt looks empty/wrong"; exit 1; }
          echo "robots.txt OK."

      # ── Contact form endpoint ────────────────────────────────────────────
      - name: Contact form rejects GET
        run: |
          STATUS=$(curl -o /tmp/form_get.json -s -w "%{http_code}" --max-time 15 "$BASE/default.php")
          echo "Status: $STATUS"
          # 200 with {"ok":false,...} OR 405 are both acceptable
          BODY=$(cat /tmp/form_get.json)
          echo "Body: $BODY"
          echo "$BODY" | grep -qi '"ok":false' \
            || [ "$STATUS" = "405" ] \
            || { echo "ERROR: unexpected response to GET on contact form"; exit 1; }
          echo "Contact form GET rejected correctly."

      - name: Contact form rejects empty POST
        run: |
          BODY=$(curl -s --max-time 15 -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$BASE/default.php")
          echo "Body: $BODY"
          echo "$BODY" | grep -qi '"ok":false' \
            || { echo "ERROR: empty POST should return ok:false"; exit 1; }
          echo "Contact form empty POST validation works."

      - name: Contact form rejects invalid email
        run: |
          BODY=$(curl -s --max-time 15 -X POST \
            -H "Content-Type: application/json" \
            -d '{"name":"Test","email":"not-an-email","message":"Hello"}' \
            "$BASE/default.php")
          echo "Body: $BODY"
          echo "$BODY" | grep -qi '"ok":false' \
            || { echo "ERROR: invalid email should return ok:false"; exit 1; }
          echo "Contact form email validation works."

      # ── Smoke summary ─────────────────────────────────────────────────────
      - name: Smoke test summary
        if: always()
        run: echo "Smoke tests complete for $BASE"
